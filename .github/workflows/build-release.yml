name: Release Build (Win / Mac / Ubuntu)
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'x86_64-apple-darwin'
            arch_ext: 'aarch64-apple-darwin' # We will use universal or build twice
            os_name: 'macos'
            binary_name: 'bnapp-backend-x86_64-apple-darwin'
          - platform: 'ubuntu-20.04'
            target: 'x86_64-unknown-linux-gnu'
            os_name: 'ubuntu'
            binary_name: 'bnapp-backend-x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            os_name: 'windows'
            binary_name: 'bnapp-backend-x86_64-pc-windows-msvc.exe'

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-20.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install Python Backend Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller fastapi uvicorn pandas numpy pymc arviz numpyro jax

      - name: Build Python Sidecar (PyInstaller)
        run: |
          pyinstaller --onefile --name bnapp-backend backend/main.py
          mkdir -p src-tauri/binaries
          
          # Move and rename binary for Tauri sidecar expectation
          # Note: Windows creates .exe automatically
          cp dist/bnapp-backend* src-tauri/binaries/${{ matrix.binary_name }}

      - name: Install Frontend Dependencies
        run: npm i

      - name: Build Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v1.0.0 # Change as needed or use ${{ github.ref_name }} on release
          releaseName: 'DeepBayes Evaluation Pipeline v1.0.0'
          releaseBody: '跨平台打包发布：包含 Windows, macOS, 和 Ubuntu (银河麒麟/统信OS 兼容)。'
          releaseDraft: true
          prerelease: false
