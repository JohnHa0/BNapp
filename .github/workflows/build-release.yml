name: Release Build (Win / Mac / Ubuntu)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            os_name: 'macos'
            binary_name: 'main-aarch64-apple-darwin'
            tauri_args: ''
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            os_name: 'ubuntu'
            binary_name: 'main-x86_64-unknown-linux-gnu'
            tauri_args: '--bundles deb'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            os_name: 'windows'
            binary_name: 'main-x86_64-pc-windows-msvc.exe'
            tauri_args: ''

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      APPIMAGE_EXTRACT_AND_RUN: 1

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev libsoup-3.0-dev libfuse2 zsync

      - name: Install Python Backend Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r backend/requirements.txt --extra-index-url https://abetlen.github.io/llama-cpp-python/whl/cpu

      - name: Build Python Sidecar (PyInstaller onedir)
        shell: bash
        run: |
          # 使用 main.spec (onedir 模式)，输出到 dist-backend/ 避免与 Vite 的 dist/ 冲突
          pyinstaller main.spec --noconfirm --distpath dist-backend
          mkdir -p src-tauri/binaries
          
          # 复制 exe (重命名为 Tauri sidecar 格式)
          if [[ "${{ matrix.os_name }}" == "windows" ]]; then
            cp "dist-backend/main/main.exe" "src-tauri/binaries/${{ matrix.binary_name }}"
          else
            cp "dist-backend/main/main" "src-tauri/binaries/${{ matrix.binary_name }}"
          fi
          
          # 复制 _internal 运行时目录
          cp -r "dist-backend/main/_internal" "src-tauri/binaries/_internal"
          
          echo "=== Sidecar directory size ==="
          du -sh src-tauri/binaries/ || true

      - name: Install Frontend Dependencies
        shell: bash
        run: npm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NO_STRIP: true
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DeepBayes Evaluation Pipeline ${{ github.ref_name }}'
          args: ${{ matrix.tauri_args }}
          releaseBody: |
            ## 全平台发布说明
            - **Windows**: 支持 .msi / .exe 安装程序 (NSIS 压缩)。
            - **macOS**: 支持 Apple Silicon .dmg。
            - **Ubuntu**: 兼容 Linux 发行版 .deb / .AppImage。
            
            内置 Python 推演后端与 GPU 加速安装器 (NUTS Sampler v1.0)。
          releaseDraft: true
          prerelease: false
