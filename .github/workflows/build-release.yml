name: Release Build (Win / Mac / Ubuntu)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            target: 'aarch64-apple-darwin'
            os_name: 'macos'
            binary_name: 'main-aarch64-apple-darwin'
          - platform: 'ubuntu-22.04'
            target: 'x86_64-unknown-linux-gnu'
            os_name: 'ubuntu'
            binary_name: 'main-x86_64-unknown-linux-gnu'
          - platform: 'windows-latest'
            target: 'x86_64-pc-windows-msvc'
            os_name: 'windows'
            binary_name: 'main-x86_64-pc-windows-msvc.exe'

    runs-on: ${{ matrix.platform }}
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libjavascriptcoregtk-4.1-dev libsoup-3.0-dev

      - name: Install Python Backend Dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller -r backend/requirements.txt
          # If requirements.txt is too heavy for CI disk, consider stripping jax-cuda if not needed for builds

      - name: Build Python Sidecar (PyInstaller)
        shell: bash
        run: |
          pyinstaller --onefile --name main backend/main.py
          mkdir -p src-tauri/binaries
          # 为 macOS 重命名时增加后缀，如果是 exe 则保留
          if [[ "${{ matrix.os_name }}" == "windows" ]]; then
            mv dist/main.exe src-tauri/binaries/${{ matrix.binary_name }}
          else
            mv dist/main src-tauri/binaries/${{ matrix.binary_name }}
          fi

      - name: Install Frontend Dependencies
        shell: bash
        run: npm install

      - name: Build and Release Tauri App
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'DeepBayes Evaluation Pipeline ${{ github.ref_name }}'
          releaseBody: |
            ## 全平台发布说明
            - **Windows**: 支持 .msi / .exe 安装程序。
            - **macOS**: 支持 Intel/Apple Silicon (模拟) .dmg。
            - **Ubuntu**: 兼容 Linux 发行版 .deb / .AppImage。
            
            内置 Python 推演后端 (NUTS Sampler v1.0)。
          releaseDraft: true
          prerelease: false
